name: Build and publish docker image

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - .github
      - .forgejo
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: huber1
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/huber1/skigemeinschaft:latest
          file: .docker/Dockerfile

      - name: Trigger update
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.WEBHOOK_TOKEN }}" ${{ vars.WEBHOOK_URL }}
